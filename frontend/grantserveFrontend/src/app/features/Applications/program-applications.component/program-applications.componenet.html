<app-manager-header [showSubHeader]="true" [isDashboard]="false"></app-manager-header>

<div class="container-fluid px-4 py-3">
  
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-3">
      <button (click)="goBack()" class="btn btn-light rounded-circle shadow-sm border d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;">
        <i class="bi bi-arrow-left"></i>
      </button>
      
      <div>
        <h2 class="fw-bold m-0 text-dark">Applications</h2>
        <p class="text-muted small m-0">Proposals & Documents</p>
      </div>
    </div>

    @if (applications.length > 0) {
      <span class="badge rounded-pill bg-primary-subtle text-primary px-3 py-2 border border-primary-subtle">
        {{ applications.length }} Applications Found
      </span>
    }
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" [class.justify-content-center]="applications.length === 0">
    @for (app of applications; track app.applicationID) {
      <div class="col">
        <app-application-card [data]="app"></app-application-card>
      </div>
    } @empty {
      <div class="col-12">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
          <div class="text-center p-5">
            <div class="mb-4">
              <i class="bi bi-inbox text-secondary opacity-25" style="font-size: 5rem;"></i>
            </div>
            <h4 class="fw-bold text-secondary">No Applications Found</h4>
            <p class="text-muted mx-auto" style="max-width: 350px;">
              There are no proposals or documents submitted for this program yet.
            </p>
          </div>
        </div>
      </div>
    }
  </div>
</div>
