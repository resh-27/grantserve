<nav class="navbar navbar-dark bg-dark px-4 py-2 mb-4">
  <a class="navbar-brand d-flex align-items-center" href="#">
    <strong>GrantServe</strong> 
    <span class="ms-2 badge bg-secondary text-uppercase" style="font-size: 0.6em;">Reviewer</span>
  </a>
  <button class="btn btn-outline-danger btn-sm" (click)="logout()">Logout</button>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Reviewer Dashboard</h3>
    <span class="badge bg-primary p-2">Logged in as ID: {{ reviewerId }}</span>
  </div>

  @if (reviews().length > 0) {
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      @for (r of reviews(); track r.reviewID) {
        <div class="col">
          <div class="card h-100 shadow-sm border-0" 
               [ngClass]="{'opacity-75 bg-light': r.status === 'REVIEWED'}">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <h5 class="card-title text-primary mb-0">Review {{ r.reviewID }}</h5>
                <span [class]="r.status === 'REVIEWED' ? 'badge bg-success' : 'badge bg-warning text-dark'">
                  {{ r.status }}
                </span>
              </div>
              
              <div class="mb-2">
                <label class="text-muted small d-block">PROPOSAL ID</label>
                <span class="fw-bold">{{ r.proposalId }}</span>
              </div>

              <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
                <div>
                  <span class="text-muted small d-block">SCORE</span>
                  <span class="fw-bold">{{ r.score || 'Pending' }}</span>
                </div>
                
                <button class="btn btn-primary btn-sm px-4" 
                        [disabled]="r.status === 'REVIEWED'"
                        (click)="goToReview(r)">
                  {{ r.status === 'REVIEWED' ? 'Completed' : 'Review' }}
                </button>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-5 bg-white border rounded shadow-sm">
      <p class="text-muted mb-0">No assignments found for this reviewer.</p>
    </div>
  }
</div>
