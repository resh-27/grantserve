server:
  port: 9092

spring:
  application:
    name: evaluation-service

  datasource:
    url: jdbc:mysql://localhost:3306/reviewdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

  session:
    jdbc:
      initialize-schema: always

eureka:
  instance:
    # This ensures the service registers with its IP address, solving the UnknownHost issue
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: Y2Y4ZTM1YmYtYjYyMC00ZDllLTlhZTMtZDY2ZDU4ZTMxZmE5Cg==